name: 推荐新 Skill
description: 推荐一个值得收录的 Amazon 跨境电商 Claude / AI Agent Skill
title: "[新 Skill 推荐] "
labels: ["new-skill", "needs-review"]
body:
  - type: markdown
    attributes:
      value: |
        感谢推荐！本仓库聚焦"Amazon 跨境出海 + 1688 供货上游"场景。
        其他出海平台、国内销售平台、KDP 相关均不收录。

  - type: input
    id: name
    attributes:
      label: Skill 名称
      placeholder: voc-amazon-reviews
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: GitHub URL
      placeholder: https://github.com/xxx/voc-amazon-reviews
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: 作者 GitHub handle
      placeholder: "@username"

  - type: dropdown
    id: category
    attributes:
      label: 拟归入哪个一级分类
      options:
        - 🔍 选品调研
        - ⚔️ 竞品分析
        - 📝 Listing 与内容
        - 📸 视觉与素材
        - 📊 数据分析与 BI
        - 🎯 广告与流量
        - ⭐ 评论与口碑
        - 💬 客服与售后
        - 🛠️ 通用底座
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: 真实 Amazon 使用案例
      description: 一段话描述你在 Amazon 跨境业务中具体怎么用这个 skill
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 收录前自检
      options:
        - label: 仓库 public 且 license 兼容，或作者公开声明开源
          required: true
        - label: 含 SKILL.md / plugin.json / mcp.json / manifest.json 之一
          required: true
        - label: README ≥ 200 字
          required: true
        - label: 近 6 个月内有 commit 或 release
          required: true
        - label: 属于 Amazon 跨境出海或 1688 供货场景
          required: true
